<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>デバッグ</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #f5f2ed; }
.box { background: #fff; border: 1px solid #ccc; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
.log { font-family: monospace; font-size: 13px; padding: 4px 8px; margin: 2px 0; border-radius: 4px; }
.ok   { background: #d4edda; color: #155724; }
.err  { background: #f8d7da; color: #721c24; }
.warn { background: #fff3cd; color: #856404; }
.info { background: #d1ecf1; color: #0c5460; }
button { padding: 10px 20px; margin: 6px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; }
.btn-test { background: #c8622a; color: #fff; }
.btn-file { background: #3a7d55; color: #fff; }
input[type=file] { display: none; }
</style>
</head>
<body>

<h2>🔍 デバッグページ</h2>
<p>このページで問題を特定します。各テストを順番に実行してください。</p>

<div class="box">
  <h3>テスト1: 基本JS動作</h3>
  <button class="btn-test" onclick="test1()">実行</button>
  <div id="log1"></div>
</div>

<div class="box">
  <h3>テスト2: wfオブジェクト</h3>
  <button class="btn-test" onclick="test2()">実行</button>
  <div id="log2"></div>
</div>

<div class="box">
  <h3>テスト3: AudioContext</h3>
  <button class="btn-test" onclick="test3()">実行</button>
  <div id="log3"></div>
</div>

<div class="box">
  <h3>テスト4: MP3ファイルを読み込む</h3>
  <button class="btn-file" onclick="document.getElementById('f4').click()">MP3を選択</button>
  <input type="file" id="f4" accept="audio/*" onchange="test4(this)">
  <div id="log4"></div>
</div>

<div class="box">
  <h3>テスト5: checkStep1Ready シミュレート</h3>
  <button class="btn-test" onclick="test5()">実行</button>
  <div id="log5"></div>
</div>

<div class="box">
  <h3>テスト6: Supabase接続確認</h3>
  <button class="btn-test" onclick="test6()">実行</button>
  <div id="log6"></div>
</div>

<script>
function log(id, msg, type='info') {
  const d = document.getElementById(id);
  const el = document.createElement('div');
  el.className = 'log ' + type;
  el.textContent = new Date().toLocaleTimeString() + '  ' + msg;
  d.appendChild(el);
}

// ── Test 1: Basic JS ──
function test1() {
  const id = 'log1';
  document.getElementById(id).innerHTML = '';
  try {
    log(id, '✓ JavaScriptは正常に動作しています', 'ok');
    log(id, 'ブラウザ: ' + navigator.userAgent.substring(0,60), 'info');
    log(id, 'localStorage 利用可能: ' + (typeof localStorage !== 'undefined' ? 'YES' : 'NO'), 'info');
  } catch(e) {
    log(id, '✗ エラー: ' + e.message, 'err');
  }
}

// ── Test 2: wf object ──
const wf = {
  buffer: null,
  audioCtx: null,
  fileName: '',
  selStart: 0,
  selEnd: 0,
};

function test2() {
  const id = 'log2';
  document.getElementById(id).innerHTML = '';
  try {
    log(id, '✓ wfオブジェクト定義OK', 'ok');
    log(id, 'wf.buffer = ' + wf.buffer, 'info');
    const name = 'テスト';
    const ready = name.length > 0 && wf.buffer !== null;
    log(id, 'ready (buffer=null): ' + ready + ' → ボタンは無効のはず', ready ? 'warn' : 'ok');
    wf.buffer = 'dummy';
    const ready2 = name.length > 0 && wf.buffer !== null;
    log(id, 'ready (buffer=dummy): ' + ready2 + ' → ボタンは有効のはず', ready2 ? 'ok' : 'err');
    wf.buffer = null; // reset
  } catch(e) {
    log(id, '✗ エラー: ' + e.message, 'err');
  }
}

// ── Test 3: AudioContext ──
function test3() {
  const id = 'log3';
  document.getElementById(id).innerHTML = '';
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) { log(id, '✗ AudioContextが使えません（ブラウザ非対応）', 'err'); return; }
    log(id, '✓ AudioContext利用可能', 'ok');
    const ctx = new AC();
    log(id, '✓ AudioContext作成OK, state: ' + ctx.state, 'ok');
    ctx.close();
  } catch(e) {
    log(id, '✗ エラー: ' + e.message, 'err');
  }
}

// ── Test 4: MP3 decode ──
async function test4(input) {
  const id = 'log4';
  document.getElementById(id).innerHTML = '';
  const file = input.files[0];
  if (!file) { log(id, 'ファイルが選択されていません', 'warn'); return; }
  log(id, 'ファイル名: ' + file.name, 'info');
  log(id, 'ファイルサイズ: ' + (file.size/1024/1024).toFixed(2) + ' MB', 'info');
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    const ctx = new AC();
    log(id, 'ArrayBufferに変換中...', 'info');
    const arrayBuf = await file.arrayBuffer();
    log(id, '✓ ArrayBuffer OK: ' + arrayBuf.byteLength + ' bytes', 'ok');
    log(id, 'AudioBufferにデコード中...', 'info');
    const audioBuf = await ctx.decodeAudioData(arrayBuf);
    log(id, '✓ デコードOK！ 長さ: ' + audioBuf.duration.toFixed(2) + '秒, チャンネル: ' + audioBuf.numberOfChannels, 'ok');
    wf.buffer = audioBuf;
    log(id, '✓ wf.bufferに保存完了', 'ok');
    log(id, 'checkStep1Readyをテスト...', 'info');
    const name = 'テスト';
    const ready = name.length > 0 && wf.buffer !== null;
    log(id, 'ready: ' + ready + ' → ' + (ready ? 'ボタンが有効になるはず' : 'ボタンは無効のまま（問題あり）'), ready ? 'ok' : 'err');
    ctx.close();
  } catch(e) {
    log(id, '✗ デコードエラー: ' + e.message, 'err');
    log(id, '詳細: ' + e.toString(), 'err');
  }
}

// ── Test 5: checkStep1Ready simulation ──
function test5() {
  const id = 'log5';
  document.getElementById(id).innerHTML = '';

  // Simulate the exact checkStep1Ready logic from manager.html
  const name = 'テスト名前';
  const ready = name.length > 0 && wf.buffer !== null;
  log(id, 'name: "' + name + '" (length=' + name.length + ')', 'info');
  log(id, 'wf.buffer: ' + wf.buffer, 'info');
  log(id, 'ready = ' + ready, ready ? 'ok' : 'warn');

  if (!ready) {
    log(id, '→ テスト4でMP3を読み込んでからもう一度実行してください', 'warn');
    if (wf.buffer) {
      log(id, 'wf.bufferはあります。name問題かも？', 'warn');
    } else {
      log(id, 'wf.bufferがnullです。テスト4を先に実行してください', 'warn');
    }
  } else {
    log(id, '✓ ボタンは有効になるはずです！', 'ok');
  }
}

  document.getElementById(id).innerHTML = '';

  log(id, 'Supabaseへ接続テスト...', 'info');
  try {
    const controller = new AbortController();

}
</script>
</body>
</html>
